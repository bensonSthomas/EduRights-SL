{% extends "base.html" %}

{% block content %}

<!-- ==================================================
     EDURIGHTS SL AUDIT LOGS
================================================== -->

<section class="audit-page">

    <div class="audit-container">

        <!-- ==========================================
             PAGE TOP BAR
        =========================================== -->

        <div class="audit-topbar">

            <div>

                <h2 class="audit-title">
                    System Audit Logs
                </h2>

                <p class="audit-subtitle">
                    Monitor user actions and platform activity records.
                </p>

            </div>

        </div>

        <!-- ==========================================
             SEARCH + FILTER BAR
        =========================================== -->

        <div class="audit-toolbar">

            <input
                type="text"
                id="auditSearch"
                class="audit-search"
                placeholder="Search user, action or activity..."
            >

        </div>

        <!-- ==========================================
             TABLE CARD
        =========================================== -->

        <div class="audit-card">

            <div class="audit-card-header">

                <h3>
                    Activity Records
                </h3>

            </div>

            <div class="table-responsive">

                <table
                    class="audit-table"
                    id="auditTable"
                >

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>User</th>

                            <th>Action</th>

                            <th>Date & Time</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for log in logs %}

                        <tr>

                            <td>
                                #{{ log.id }}
                            </td>

                            <td>

                                <div class="audit-user">

                                    <span class="audit-avatar">
                                        👤
                                    </span>

                                    {{ log.full_name }}

                                </div>

                            </td>

                            <td>

                                <span class="audit-badge">

                                    {{ log.action }}

                                </span>

                            </td>

                            <td>

                                {{ log.created_at }}

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</section>

<script src="{{ url_for('static', filename='js/audit_logs.js') }}"></script>

{% endblock %}
